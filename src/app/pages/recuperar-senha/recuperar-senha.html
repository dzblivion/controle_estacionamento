<script src="../../js/email.js" defer></script>
<section id="recuperar">
  <div id="area-recuperar">
    <form [formGroup]="recuperarSenha" (ngSubmit)="onSubmit()">
      <h1 class="titulo">Recuperar senha</h1>

      <div class="area-input">
        <label for="email">E-mail:</label>
        <input type="email" formControlName="email" id="email" required />
      </div>

      <div class="area-input">
        <button type="submit" [disabled]="this.recuperarSenha.invalid">Verificar</button>
      </div>
    </form>
  </div>
</section>
