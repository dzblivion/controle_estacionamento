<section id="login">
    <div id="area-login">
        <form >
            <h1 class="titulo">Entrar</h1>

            <div class="area-input">
                <label for="email">E-mail:</label>
                <input type="email" formControlName="email" id="email" required>
            </div>
            
            <div class="area-input">
                <label for="nome">Senha:</label>
                <input type="password" formControlName="senha" id="senha" required>
            </div>

            <div class="area-input">
                <button type="submit" >Entrar</button>
            </div>
        </form>
    </div>

    <div id="area-capa" data-aos="fade-left" data-aos-delay="500">
        <img src="/imagens/capa/capa-login.jpg" alt="img">
    </div>
</section>
